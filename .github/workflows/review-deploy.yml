name: Deploy review environment

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pull_request:
        description: Same-repository pull request number to deploy
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: >-
    ${{
      ((github.event_name == 'workflow_dispatch' &&
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
        github.actor == 'leanderriefel') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == 'leanderriefel' &&
        github.event.comment.user.id == 71840441 &&
        github.event.comment.body == 'quieter review')) &&
      'quieter-review' || format('quieter-review-ignored-{0}', github.run_id)
    }}
  cancel-in-progress: true

env:
  REVIEW_URL: https://review.quieter.email

jobs:
  resolve:
    name: Resolve eligible pull request
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
        github.actor == 'leanderriefel') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == 'leanderriefel' &&
        github.event.comment.user.id == 71840441 &&
        github.event.comment.body == 'quieter review')
    permissions:
      contents: read
      pull-requests: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      number: ${{ steps.pull-request.outputs.number }}
      sha: ${{ steps.pull-request.outputs.sha }}
    steps:
      - name: Resolve exact pull request revision
        id: pull-request
        uses: actions/github-script@v7
        with:
          script: |
            const ownerUserId = 71840441;
            const { data: actor } = await github.rest.users.getByUsername({
              username: context.actor,
            });
            if (actor.id !== ownerUserId) {
              core.setFailed('Only the repository owner can request a Review deployment.');
              return;
            }

            const isCommentCommand = context.eventName === 'issue_comment';
            if (isCommentCommand) {
              const comment = context.payload.comment;
              if (
                comment.user?.id !== ownerUserId ||
                comment.user?.login !== 'leanderriefel' ||
                comment.body !== 'quieter review'
              ) {
                core.setFailed('The Review comment command is not authorized.');
                return;
              }
            }

            const pullRequestNumber = Number(
              isCommentCommand
                ? context.payload.issue.number
                : context.payload.inputs.pull_request,
            );
            if (!Number.isSafeInteger(pullRequestNumber) || pullRequestNumber <= 0) {
              core.setFailed('Pull request number must be a positive integer.');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullRequestNumber,
            });

            if (pullRequest.state !== 'open') {
              core.setFailed(`Pull request #${pullRequestNumber} is not open.`);
              return;
            }
            if (pullRequest.head.repo?.full_name !== `${owner}/${repo}`) {
              core.setFailed('Fork pull requests cannot be deployed to the credentialed review environment.');
              return;
            }

            if (isCommentCommand) {
              await github.rest.reactions.createForIssueComment({
                owner,
                repo,
                comment_id: context.payload.comment.id,
                content: 'rocket',
              });
            }

            core.setOutput('number', String(pullRequestNumber));
            core.setOutput('sha', pullRequest.head.sha);
            await core.summary
              .addHeading('Review deployment candidate')
              .addLink(`#${pullRequestNumber}: ${pullRequest.title}`, pullRequest.html_url)
              .addCodeBlock(pullRequest.head.sha)
              .addRaw('This workflow is opt-in and is not a required pull request check.')
              .write();

  verify:
    name: Verify exact revision without secrets
    needs: resolve
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    outputs:
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - name: Checkout exact pull request revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: "24.18.0"

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Check copy policy
        run: vp run check:copy

      - name: Build environment package
        run: vp run @quieter/env#build

      - name: Test
        run: vp test

      - name: Build without credentials
        run: vp run -r build

      - name: Bundle Worker without credentials
        env:
          WRANGLER_SEND_METRICS: "false"
        run: |
          node apps/web/node_modules/wrangler/bin/wrangler.js deploy apps/web/dist/server/server.js \
            --assets apps/web/dist/client \
            --autoconfig=false \
            --compatibility-date 2026-07-11 \
            --compatibility-flag nodejs_compat \
            --dry-run \
            --outdir .review-bundle
          mkdir -p review-artifact/client
          cp .review-bundle/server.js review-artifact/server.js
          cp -R apps/web/dist/client/. review-artifact/client/
          rm -f review-artifact/client/.dev.vars review-artifact/client/wrangler.json
          printf '%s\n' '${{ needs.resolve.outputs.sha }}' > review-artifact/client/review-revision.txt

      - name: Upload credential-free artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: review-worker-${{ needs.resolve.outputs.sha }}
          path: review-artifact
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Promote exact revision to review
    needs:
      - resolve
      - verify
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment:
      name: Review
      url: https://review.quieter.email
    timeout-minutes: 25
    steps:
      - name: Checkout trusted deployment code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install trusted deployment tooling
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Download verified artifact
        uses: actions/download-artifact@v4
        with:
          name: review-worker-${{ needs.resolve.outputs.sha }}
          path: .review-deploy

      - name: Validate inert artifact
        run: |
          test -f .review-deploy/server.js
          test -d .review-deploy/client
          test ! -e .review-deploy/client/.dev.vars
          test ! -e .review-deploy/client/wrangler.json
          test -z "$(find .review-deploy -type l -print -quit)"
          test "$(find .review-deploy -mindepth 1 -maxdepth 1 -printf '%f\n' | sort | tr '\n' ' ')" = "client server.js "
          file_count=$(find .review-deploy -type f | wc -l)
          byte_count=$(du -sb .review-deploy | cut -f1)
          test "$file_count" -le 5000
          test "$byte_count" -le 157286400
          test "$(bun -e "console.log(require('./apps/web/node_modules/wrangler/package.json').version)")" = "4.110.0"
          bun apps/web/node_modules/wrangler/bin/wrangler.js deploy \
            --config .github/review-worker.wrangler.jsonc \
            --dry-run \
            --no-bundle

      - name: Upload artifact with trusted configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: |
          bun apps/web/node_modules/wrangler/bin/wrangler.js deploy \
            --config .github/review-worker.wrangler.jsonc \
            --message "PR #${{ needs.resolve.outputs.number }} at ${{ needs.resolve.outputs.sha }}" \
            --keep-vars \
            --no-bundle \
            --tag "pr-${{ needs.resolve.outputs.number }}-${{ needs.resolve.outputs.sha }}"

      - name: Verify promoted revision
        env:
          REVIEW_SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          for attempt in $(seq 1 12); do
            deployed_revision=$(curl --fail --silent --show-error \
              --header 'cache-control: no-cache' \
              "${REVIEW_URL}/review-revision.txt?revision=${REVIEW_SHA}" || true)
            if [ "$deployed_revision" = "$REVIEW_SHA" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Review environment did not promote revision ${REVIEW_SHA}." >&2
          exit 1

  comment:
    name: Record review deployment
    needs:
      - deploy
      - resolve
      - verify
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Record promoted revision on pull request
        uses: actions/github-script@v7
        env:
          ARTIFACT_DIGEST: ${{ needs.verify.outputs.artifact_digest }}
          PULL_REQUEST_NUMBER: ${{ needs.resolve.outputs.number }}
          REVIEW_SHA: ${{ needs.resolve.outputs.sha }}
        with:
          script: |
            const marker = '<!-- quieter-review-environment -->';
            const shortSha = process.env.REVIEW_SHA.slice(0, 12);
            const body = [
              marker,
              `Review environment: ${process.env.REVIEW_URL}`,
              `Promoted revision: \`${shortSha}\``,
              `Artifact digest: \`${process.env.ARTIFACT_DIGEST}\``,
              '',
              'The revision was built without credentials and uploaded by trusted default-branch deployment code.',
              'This opt-in deployment is independent of merge checks.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.PULL_REQUEST_NUMBER);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
