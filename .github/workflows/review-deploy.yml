name: Deploy review environment

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [reopened, synchronize]
  workflow_dispatch:
    inputs:
      pull_request:
        description: Same-repository pull request number to deploy
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: >-
    ${{
      ((github.event_name == 'workflow_dispatch' &&
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
        github.actor == 'leanderriefel') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == 'leanderriefel' &&
        github.event.comment.user.id == 71840441 &&
        github.event.comment.body == 'quieter review') ||
      github.event_name == 'pull_request_target') &&
      format('quieter-review-prepare-{0}',
        github.event.pull_request.number ||
        github.event.issue.number ||
        inputs.pull_request) ||
      format('quieter-review-ignored-{0}', github.run_id)
    }}
  cancel-in-progress: true

env:
  REVIEW_URL: https://review.quieter.email

jobs:
  resolve:
    name: Resolve review deployment
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
        github.actor == 'leanderriefel') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == 'leanderriefel' &&
        github.event.comment.user.id == 71840441 &&
        github.event.comment.body == 'quieter review') ||
      github.event_name == 'pull_request_target'
    permissions:
      checks: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      check_run_id: ${{ steps.pull-request.outputs.check-run-id }}
      eligible: ${{ steps.pull-request.outputs.eligible }}
      number: ${{ steps.pull-request.outputs.number }}
      sha: ${{ steps.pull-request.outputs.sha }}
    steps:
      - name: Resolve authorized pull request revision
        id: pull-request
        uses: actions/github-script@v7
        with:
          script: |
            const ownerLogin = 'leanderriefel';
            const ownerUserId = 71840441;
            const { owner, repo } = context.repo;
            const isCommentCommand = context.eventName === 'issue_comment';
            const isPullRequestUpdate = context.eventName === 'pull_request_target';

            core.setOutput('eligible', 'false');

            let pullRequestNumber;
            if (isPullRequestUpdate) {
              pullRequestNumber = Number(context.payload.pull_request?.number);
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullRequestNumber,
                per_page: 100,
              });
              const authorized = comments.some(
                (comment) =>
                  comment.user?.id === ownerUserId &&
                  comment.user?.login === ownerLogin &&
                  comment.body === 'quieter review',
              );
              if (!authorized) {
                core.notice('This pull request has not opted into automatic Review deployments.');
                return;
              }
            } else {
              const { data: actor } = await github.rest.users.getByUsername({
                username: context.actor,
              });
              if (actor.id !== ownerUserId || actor.login !== ownerLogin) {
                core.setFailed('Only the repository owner can request a Review deployment.');
                return;
              }

              if (isCommentCommand) {
                const comment = context.payload.comment;
                if (
                  comment.user?.id !== ownerUserId ||
                  comment.user?.login !== ownerLogin ||
                  comment.body !== 'quieter review'
                ) {
                  core.setFailed('The Review comment command is not authorized.');
                  return;
                }
              }

              pullRequestNumber = Number(
                isCommentCommand
                  ? context.payload.issue.number
                  : context.payload.inputs.pull_request,
              );
            }

            if (!Number.isSafeInteger(pullRequestNumber) || pullRequestNumber <= 0) {
              core.setFailed('Pull request number must be a positive integer.');
              return;
            }

            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullRequestNumber,
            });
            if (pullRequest.state !== 'open') {
              core.setFailed(`Pull request #${pullRequestNumber} is not open.`);
              return;
            }
            if (pullRequest.head.repo?.full_name !== `${owner}/${repo}`) {
              core.setFailed('Fork pull requests cannot be deployed to the credentialed review environment.');
              return;
            }

            if (isCommentCommand) {
              await github.rest.reactions.createForIssueComment({
                owner,
                repo,
                comment_id: context.payload.comment.id,
                content: 'rocket',
              });
            }

            const supersededSha = isPullRequestUpdate ? context.payload.before : undefined;
            if (supersededSha && supersededSha !== pullRequest.head.sha) {
              const { data: previousChecks } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: supersededSha,
                check_name: 'Review deployment',
                filter: 'latest',
                per_page: 100,
              });
              for (const check of previousChecks.check_runs) {
                if (check.status !== 'completed') {
                  await github.rest.checks.update({
                    owner,
                    repo,
                    check_run_id: check.id,
                    status: 'completed',
                    conclusion: 'cancelled',
                    completed_at: new Date().toISOString(),
                    output: {
                      title: 'Superseded by a newer revision',
                      summary: `A newer commit is being prepared for ${process.env.REVIEW_URL}.`,
                    },
                  });
                }
              }
            }

            const { data: currentChecks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pullRequest.head.sha,
              check_name: 'Review deployment',
              filter: 'latest',
              per_page: 100,
            });
            for (const check of currentChecks.check_runs) {
              if (check.status !== 'completed') {
                await github.rest.checks.update({
                  owner,
                  repo,
                  check_run_id: check.id,
                  status: 'completed',
                  conclusion: 'cancelled',
                  completed_at: new Date().toISOString(),
                  output: {
                    title: 'Superseded by a newer deployment',
                    summary: 'A new Review deployment was requested for this revision.',
                  },
                });
              }
            }

            const detailsUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const { data: checkRun } = await github.rest.checks.create({
              owner,
              repo,
              name: 'Review deployment',
              head_sha: pullRequest.head.sha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              details_url: detailsUrl,
              output: {
                title: 'Preparing review build',
                summary: `Building \`${pullRequest.head.sha.slice(0, 12)}\` for ${process.env.REVIEW_URL}.`,
              },
            });

            core.setOutput('check-run-id', String(checkRun.id));
            core.setOutput('eligible', 'true');
            core.setOutput('number', String(pullRequestNumber));
            core.setOutput('sha', pullRequest.head.sha);
            await core.summary
              .addHeading('Review deployment candidate')
              .addLink(`#${pullRequestNumber}: ${pullRequest.title}`, pullRequest.html_url)
              .addCodeBlock(pullRequest.head.sha)
              .addRaw(
                isPullRequestUpdate
                  ? 'Automatically redeploying an opted-in pull request.'
                  : 'Future pushes to this pull request will redeploy automatically.',
              )
              .write();

  prepare:
    name: Build review artifact
    needs: resolve
    if: ${{ needs.resolve.outputs.eligible == 'true' }}
    permissions:
      contents: read
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    outputs:
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - name: Checkout exact pull request revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build environment package
        run: ./node_modules/.bin/vp run @quieter/env#build

      - name: Create credential-free Worker build configuration
        run: |
          printf '%s\n' \
            '{' \
            '  "name": "quieter-review-artifact",' \
            '  "main": "./apps/web/src/server.ts",' \
            '  "compatibility_date": "2026-07-11",' \
            '  "compatibility_flags": ["nodejs_compat"]' \
            '}' \
            > review-build-worker.wrangler.jsonc

      - name: Build without credentials
        env:
          SST_WRANGLER_PATH: ${{ github.workspace }}/review-build-worker.wrangler.jsonc
          VITE_QUIETER_DEPLOYMENT_ENV: preview
        run: ./node_modules/.bin/vp run -r build

      - name: Bundle Worker without credentials
        env:
          WRANGLER_SEND_METRICS: "false"
        run: |
          test "$(node -p "require('./apps/web/dist/server/wrangler.json').main")" = "index.js"
          printf '%s\n' \
            'let handlerPromise;' \
            'export default {' \
            '  async fetch(request, env, context) {' \
            '    globalThis.$SST_LINKS ??= {};' \
            '    globalThis.$SST_LINKS.AppDatabaseV2 = env.AppDatabaseV2;' \
            '    handlerPromise ??= import("./apps/web/dist/server/index.js").then((module) => module.default);' \
            '    return (await handlerPromise).fetch(request, env, context);' \
            '  },' \
            '};' \
            > review-worker-entry.mjs
          node apps/web/node_modules/wrangler/bin/wrangler.js deploy review-worker-entry.mjs \
            --config review-build-worker.wrangler.jsonc \
            --name quieter-review-artifact \
            --assets apps/web/dist/client \
            --autoconfig=false \
            --compatibility-date 2026-07-11 \
            --compatibility-flag nodejs_compat \
            --dry-run \
            --outdir .review-bundle
          test "$(grep -Foc 'createRequire(import.meta.url)' .review-bundle/review-worker-entry.js)" -eq 0
          test "$(grep -c '^export {' .review-bundle/review-worker-entry.js)" -eq 1
          mkdir -p review-artifact/client
          cp .review-bundle/review-worker-entry.js review-artifact/server.js
          cp -R apps/web/dist/client/. review-artifact/client/
          rm -f review-artifact/client/.dev.vars review-artifact/client/wrangler.json
          printf '%s\n' '${{ needs.resolve.outputs.sha }}' > review-artifact/client/review-revision.txt

      - name: Upload credential-free artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: review-worker-${{ needs.resolve.outputs.sha }}
          path: review-artifact
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy review environment
    needs:
      - prepare
      - resolve
    if: ${{ always() && needs.resolve.outputs.eligible == 'true' }}
    permissions:
      checks: write
      contents: read
      issues: write
      pull-requests: write
    concurrency:
      group: quieter-review
      cancel-in-progress: true
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment:
      name: Review
      url: https://review.quieter.email
    timeout-minutes: 10
    steps:
      - name: Checkout trusted deployment code
        if: ${{ needs.prepare.result == 'success' }}
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Setup Bun
        if: ${{ needs.prepare.result == 'success' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        if: ${{ needs.prepare.result == 'success' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install trusted deployment tooling
        if: ${{ needs.prepare.result == 'success' }}
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Download verified artifact
        if: ${{ needs.prepare.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: review-worker-${{ needs.resolve.outputs.sha }}
          path: .review-deploy

      - name: Validate inert artifact
        if: ${{ needs.prepare.result == 'success' }}
        run: |
          test -f .review-deploy/server.js
          test -d .review-deploy/client
          test ! -e .review-deploy/client/.dev.vars
          test ! -e .review-deploy/client/wrangler.json
          test -z "$(find .review-deploy -type l -print -quit)"
          test "$(find .review-deploy -mindepth 1 -maxdepth 1 -printf '%f\n' | sort | tr '\n' ' ')" = "client server.js "
          file_count=$(find .review-deploy -type f | wc -l)
          byte_count=$(du -sb .review-deploy | cut -f1)
          test "$file_count" -le 5000
          test "$byte_count" -le 157286400
          test "$(bun -e "console.log(require('./apps/web/node_modules/wrangler/package.json').version)")" = "4.110.0"
          node apps/web/node_modules/wrangler/bin/wrangler.js deploy \
            --config .github/review-worker.wrangler.jsonc \
            --dry-run \
            --no-bundle

      - name: Mark revision as deploying
        if: ${{ needs.prepare.result == 'success' }}
        uses: actions/github-script@v7
        env:
          CHECK_RUN_ID: ${{ needs.resolve.outputs.check_run_id }}
          REVIEW_SHA: ${{ needs.resolve.outputs.sha }}
        with:
          script: |
            await github.rest.checks.update({
              ...context.repo,
              check_run_id: Number(process.env.CHECK_RUN_ID),
              status: 'in_progress',
              details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              output: {
                title: 'Deploying review environment',
                summary: `Uploading \`${process.env.REVIEW_SHA.slice(0, 12)}\` to ${process.env.REVIEW_URL}.`,
              },
            });

      - name: Upload artifact with trusted configuration
        if: ${{ needs.prepare.result == 'success' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: |
          node apps/web/node_modules/wrangler/bin/wrangler.js deploy \
            --config .github/review-worker.wrangler.jsonc \
            --message "PR #${{ needs.resolve.outputs.number }} at ${{ needs.resolve.outputs.sha }}" \
            --keep-vars \
            --no-bundle \
            --tag "pr-${{ needs.resolve.outputs.number }}-${{ needs.resolve.outputs.sha }}"

      - name: Verify promoted revision and application health
        if: ${{ needs.prepare.result == 'success' }}
        env:
          REVIEW_SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          for attempt in $(seq 1 10); do
            deployed_revision=$(curl --fail --silent --show-error \
              --header 'cache-control: no-cache' \
              "${REVIEW_URL}/review-revision.txt?revision=${REVIEW_SHA}" || true)
            application_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --header 'cache-control: no-cache' \
              "${REVIEW_URL}/?revision=${REVIEW_SHA}" || true)
            schema_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --header 'cache-control: no-cache' \
              "${REVIEW_URL}/api/review-health?revision=${REVIEW_SHA}" || true)
            if [ "$deployed_revision" = "$REVIEW_SHA" ] && \
              [[ "$application_status" =~ ^[23] ]] && \
              [ "$schema_status" = "204" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Review environment did not promote a healthy, schema-compatible revision ${REVIEW_SHA}." >&2
          exit 1

      - name: Record deployment result
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          ARTIFACT_DIGEST: ${{ needs.prepare.outputs.artifact_digest }}
          CHECK_RUN_ID: ${{ needs.resolve.outputs.check_run_id }}
          DEPLOYMENT_RESULT: ${{ job.status }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          PULL_REQUEST_NUMBER: ${{ needs.resolve.outputs.number }}
          REVIEW_SHA: ${{ needs.resolve.outputs.sha }}
        with:
          script: |
            const succeeded =
              process.env.PREPARE_RESULT === 'success' &&
              process.env.DEPLOYMENT_RESULT === 'success';
            const detailsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = process.env.REVIEW_SHA.slice(0, 12);

            await github.rest.checks.update({
              ...context.repo,
              check_run_id: Number(process.env.CHECK_RUN_ID),
              status: 'completed',
              conclusion: succeeded ? 'success' : 'failure',
              completed_at: new Date().toISOString(),
              details_url: detailsUrl,
              output: {
                title: succeeded ? 'Review environment is ready' : 'Review deployment failed',
                summary: succeeded
                  ? `[Open ${process.env.REVIEW_URL}](${process.env.REVIEW_URL}) at \`${shortSha}\`.`
                  : `[Open the deployment log](${detailsUrl}) for \`${shortSha}\`.`,
              },
            });

            const marker = '<!-- quieter-review-environment -->';
            const body = succeeded
              ? [
                  marker,
                  `Review environment: ${process.env.REVIEW_URL}`,
                  `Promoted revision: \`${shortSha}\``,
                  `Artifact digest: \`${process.env.ARTIFACT_DIGEST}\``,
                  '',
                  'Future pushes to this pull request deploy automatically.',
                  'The revision was built without credentials and uploaded by trusted default-branch deployment code.',
                ].join('\n')
              : [
                  marker,
                  `Review deployment failed for revision \`${shortSha}\`.`,
                  `[Open the deployment log](${detailsUrl})`,
                  '',
                  'Future pushes to this pull request will retry automatically.',
                ].join('\n');
            const issue_number = Number(process.env.PULL_REQUEST_NUMBER);
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
            );

            if (previous) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number, body });
            }
