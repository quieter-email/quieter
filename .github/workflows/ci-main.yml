name: Checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, typecheck, test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  migration-integration:
    name: Migration integration tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quieter
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quieter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/quieter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check committed migrations match the schema
        run: bun run db:check

      - name: Test committed database migrations
        run: bun run db:test-migrations

      - name: Apply consent migrations to temporary PostgreSQL
        run: bun run consent:migrate

      - name: Verify a repeated consent migration run is a no-op
        run: bun run consent:migrate
