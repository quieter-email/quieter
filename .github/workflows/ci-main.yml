name: Checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect migration changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      consent: ${{ steps.changes.outputs.consent }}
      database: ${{ steps.changes.outputs.database }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration-related changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "consent=true" >> "$GITHUB_OUTPUT"
            echo "database=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "origin/$BASE_REF...HEAD" -- \
            apps/web/package.json \
            apps/web/scripts/migrate-consent.ts \
            apps/web/src/lib/c15t.server.ts \
            bun.lock \
            package.json \
            turbo.json; then
            echo "consent=false" >> "$GITHUB_OUTPUT"
          else
            echo "consent=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet "origin/$BASE_REF...HEAD" -- \
            bun.lock \
            package.json \
            packages/database/drizzle \
            packages/database/drizzle.config.ts \
            packages/database/package.json \
            packages/database/scripts \
            packages/database/src/schema.ts \
            turbo.json; then
            echo "database=false" >> "$GITHUB_OUTPUT"
          else
            echo "database=true" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Format, lint, typecheck, test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  migration-integration:
    name: Migration integration tests
    needs: changes
    if: ${{ needs.changes.outputs.database == 'true' || needs.changes.outputs.consent == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quieter
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quieter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/quieter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check committed migrations match the schema
        if: ${{ needs.changes.outputs.database == 'true' }}
        run: bun run db:check

      - name: Test committed database migrations
        if: ${{ needs.changes.outputs.database == 'true' }}
        run: bun run db:test-migrations

      - name: Apply consent migrations to temporary PostgreSQL
        if: ${{ needs.changes.outputs.consent == 'true' }}
        run: bun run consent:migrate

      - name: Verify a repeated consent migration run is a no-op
        if: ${{ needs.changes.outputs.consent == 'true' }}
        run: bun run consent:migrate
