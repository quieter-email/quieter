name: Checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect migration changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      database: ${{ steps.changes.outputs.database }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration-related changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "database=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "origin/$BASE_REF...HEAD" -- \
            bun.lock \
            package.json \
            packages/database/drizzle \
            packages/database/drizzle.config.ts \
            packages/database/package.json \
            packages/database/scripts \
            packages/database/src/schema.ts \
            turbo.json; then
            echo "database=false" >> "$GITHUB_OUTPUT"
          else
            echo "database=true" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Format, lint, typecheck, test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Check backend import boundaries
        run: bun run check:boundaries

      - name: Bundle AWS handlers
        run: bun run check:bundles

      - name: Test
        run: bun run test

  migration-integration:
    name: Migration integration tests
    needs: changes
    if: ${{ needs.changes.outputs.database == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quieter_migration_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quieter_migration_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/quieter_migration_test
      MIGRATION_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/quieter_migration_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check committed migrations match the schema
        if: ${{ needs.changes.outputs.database == 'true' }}
        run: bun run db:check

      - name: Test committed database migrations
        run: bun run db:test-migrations
