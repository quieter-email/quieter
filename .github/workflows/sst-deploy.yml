name: Deploy SST Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage to deploy
        required: true
        default: production
        type: choice
        options:
          - production
          - mail-dev

permissions:
  contents: read
  id-token: write

concurrency:
  group: quieter-deploy-${{ inputs.stage || 'production' }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect migration changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      consent: ${{ steps.changes.outputs.consent }}
      database: ${{ steps.changes.outputs.database }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration-related changes
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "consent=true" >> "$GITHUB_OUTPUT"
            echo "database=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$BEFORE_SHA...HEAD" -- \
            apps/web/package.json \
            apps/web/scripts/migrate-consent.ts \
            apps/web/src/lib/c15t.server.ts \
            bun.lock \
            package.json \
            turbo.json; then
            echo "consent=false" >> "$GITHUB_OUTPUT"
          else
            echo "consent=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet "$BEFORE_SHA...HEAD" -- \
            bun.lock \
            package.json \
            packages/database/drizzle \
            packages/database/drizzle.config.ts \
            packages/database/package.json \
            packages/database/scripts \
            packages/database/src/schema.ts \
            turbo.json; then
            echo "database=false" >> "$GITHUB_OUTPUT"
          else
            echo "database=true" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify release
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  migration-integration:
    name: Migration integration tests
    needs: changes
    if: ${{ needs.changes.outputs.database == 'true' || needs.changes.outputs.consent == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quieter
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quieter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/quieter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check committed migrations match the schema
        if: ${{ needs.changes.outputs.database == 'true' }}
        run: bun run db:check

      - name: Test committed database migrations
        if: ${{ needs.changes.outputs.database == 'true' }}
        run: bun run db:test-migrations

      - name: Apply consent migrations
        if: ${{ needs.changes.outputs.consent == 'true' }}
        run: bun run consent:migrate

      - name: Verify repeated consent migrations are a no-op
        if: ${{ needs.changes.outputs.consent == 'true' }}
        run: bun run consent:migrate

  deploy:
    name: Deploy ${{ inputs.stage || 'production' }}
    needs:
      - migration-integration
      - verify
    if: >-
      ${{
        always() &&
        needs.verify.result == 'success' &&
        (needs.migration-integration.result == 'success' ||
          needs.migration-integration.result == 'skipped')
      }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: ${{ inputs.stage || 'production' }}
    timeout-minutes: 25
    env:
      SST_STAGE: ${{ inputs.stage || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply production database migrations
        if: ${{ env.SST_STAGE == 'production' }}
        env:
          DATABASE_MIGRATION_URL: ${{ secrets.DATABASE_MIGRATION_URL }}
        run: bun run db:deploy

      - name: Apply production consent migrations
        if: ${{ env.SST_STAGE == 'production' }}
        env:
          DATABASE_MIGRATION_URL: ${{ secrets.DATABASE_MIGRATION_URL }}
        run: bun run consent:migrate

      - name: Deploy SST
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_TOKEN_ENCRYPTION_KEY: ${{ secrets.GMAIL_TOKEN_ENCRYPTION_KEY }}
          GOOGLE_GMAIL_CLIENT_ID: ${{ secrets.GOOGLE_GMAIL_CLIENT_ID }}
          GOOGLE_GMAIL_CLIENT_SECRET: ${{ secrets.GOOGLE_GMAIL_CLIENT_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORGANIZATION_ID: ${{ vars.POLAR_ORGANIZATION_ID || secrets.POLAR_ORGANIZATION_ID }}
          POLAR_SANDBOX: ${{ vars.POLAR_SANDBOX }}
        run: bunx sst deploy --config sst.config.ts --stage "$SST_STAGE"

      - name: Sync SST outputs to Vercel
        if: ${{ env.SST_STAGE == 'production' }}
        env:
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID || secrets.VERCEL_TEAM_ID || vars.VERCEL_ORG_ID || secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_PROJECT_ID}" ] || [ -z "${VERCEL_TEAM_ID}" ] || [ -z "${VERCEL_TOKEN}" ]; then
            echo "VERCEL_PROJECT_ID, VERCEL_TEAM_ID, and VERCEL_TOKEN are required to sync Vercel env vars." >&2
            exit 1
          fi

          bun run - <<'EOF'
          const outputs = await Bun.file(".sst/outputs.json").json();
          const values = [
            ["CHAT_GENERATION_START_URL", outputs.chatGenerationEnqueueUrl],
            ["MAIL_BUCKET", outputs.mailBucket],
            ["MAIL_RECEIPT_TOPIC_ARN", outputs.mailReceiptTopicArn],
            ["MAIL_RECEIPT_ROLE_ARN", outputs.mailReceiptRoleArn],
            ["MAIL_RECEIPT_RULE_SET_NAME", outputs.mailReceiptRuleSetName],
          ];
          const missing = values.filter(([, value]) => !value).map(([key]) => key);

          if (missing.length > 0) {
            throw new Error(`Missing SST outputs: ${missing.join(", ")}`);
          }

          const projectId = process.env.VERCEL_PROJECT_ID;
          const teamId = process.env.VERCEL_TEAM_ID;
          const token = process.env.VERCEL_TOKEN;
          const url = new URL(`https://api.vercel.com/v10/projects/${projectId}/env`);

          url.searchParams.set("teamId", teamId);
          url.searchParams.set("upsert", "true");

          const response = await fetch(url, {
            body: JSON.stringify(
              values.map(([key, value]) => ({
                key,
                value,
                type: "sensitive",
                target: ["production"],
                comment: "Synced from SST production outputs.",
              })),
            ),
            headers: {
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
            },
            method: "POST",
          });
          const body = await response.text();

          if (!response.ok) {
            throw new Error(`Vercel env sync failed with ${response.status}: ${body}`);
          }

          const result = body ? JSON.parse(body) : {};
          const failed = Array.isArray(result.failed) ? result.failed : [];

          if (failed.length > 0) {
            throw new Error(`Vercel env sync failed: ${JSON.stringify(failed)}`);
          }

          console.log("Synced SST outputs to Vercel production sensitive env vars.");
          EOF

      - name: Trigger Vercel production deploy
        if: ${{ env.SST_STAGE == 'production' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID || secrets.VERCEL_TEAM_ID || vars.VERCEL_ORG_ID || secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bun packages/deployment/src/wait-for-vercel-deployment.ts
