name: Deploy SST Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage to deploy
        required: true
        default: production
        type: choice
        options:
          - production
          - mail-dev

permissions:
  contents: read
  id-token: write

concurrency:
  group: quieter-deploy-${{ inputs.stage || 'production' }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect migration changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      database: ${{ steps.changes.outputs.database }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration-related changes
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "database=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$BEFORE_SHA...HEAD" -- \
            bun.lock \
            package.json \
            packages/database/drizzle \
            packages/database/drizzle.config.ts \
            packages/database/package.json \
            packages/database/scripts \
            packages/database/src/schema.ts \
            vite.config.ts; then
            echo "database=false" >> "$GITHUB_OUTPUT"
          else
            echo "database=true" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify release
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: "24.18.0"

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Check copy policy
        run: vp run check:copy

      - name: Check backend import boundaries
        run: vp run @quieter/aws#check:boundaries

      - name: Bundle AWS handlers
        run: vp run @quieter/aws#check:bundles

      - name: Test
        run: vp test

  migration-integration:
    name: Migration integration tests
    needs: changes
    if: ${{ needs.changes.outputs.database == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quieter_migration_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quieter_migration_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/quieter_migration_test
      MIGRATION_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/quieter_migration_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: "24.18.0"

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check committed migrations match the schema
        run: vp run @quieter/database#db:check

      - name: Test committed database migrations
        run: vp run @quieter/database#db:test-migrations

  deploy:
    name: Deploy ${{ inputs.stage || 'production' }}
    needs:
      - migration-integration
      - verify
    if: >-
      ${{
        always() &&
        needs.verify.result == 'success' &&
        (needs.migration-integration.result == 'success' ||
          needs.migration-integration.result == 'skipped')
      }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: ${{ inputs.stage || 'production' }}
    timeout-minutes: 35
    env:
      SST_STAGE: ${{ inputs.stage || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: "24.18.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build deployment configuration
        run: vp run @quieter/env#build

      - name: Apply production database migrations
        if: ${{ env.SST_STAGE == 'production' }}
        env:
          DATABASE_MIGRATION_URL: ${{ secrets.DATABASE_MIGRATION_URL }}
          QUIETER_ALLOW_REMOTE_MIGRATIONS: production
        run: vp run @quieter/database#db:deploy

      - name: Sync GitHub configuration and deploy with SST
        env:
          APP_SITE_PASSWORD: ${{ secrets.APP_SITE_PASSWORD }}
          BETTER_AUTH_APP_NAME: ${{ vars.BETTER_AUTH_APP_NAME }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_TRUSTED_ORIGINS: ${{ vars.BETTER_AUTH_TRUSTED_ORIGINS }}
          CHAT_GENERATION_START_TOKEN: ${{ secrets.CHAT_GENERATION_START_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
          CONNECTOR_TOKEN_ENCRYPTION_KEY: ${{ secrets.CONNECTOR_TOKEN_ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_CREDENTIAL_ROTATION_TOKEN: ${{ secrets.GMAIL_CREDENTIAL_ROTATION_TOKEN }}
          GMAIL_LIVE_SYNC_TOKEN_SECRET: ${{ secrets.GMAIL_LIVE_SYNC_TOKEN_SECRET }}
          GMAIL_PUBSUB_PROCESS_TOKEN: ${{ secrets.GMAIL_PUBSUB_PROCESS_TOKEN }}
          GMAIL_PUBSUB_PUSH_AUDIENCE: ${{ vars.GMAIL_PUBSUB_PUSH_AUDIENCE }}
          GMAIL_PUBSUB_PUSH_SERVICE_ACCOUNT: ${{ vars.GMAIL_PUBSUB_PUSH_SERVICE_ACCOUNT }}
          GMAIL_PUBSUB_SUBSCRIPTION: ${{ vars.GMAIL_PUBSUB_SUBSCRIPTION }}
          GMAIL_PUBSUB_TOPIC: ${{ vars.GMAIL_PUBSUB_TOPIC }}
          GMAIL_TOKEN_ENCRYPTION_KEY: ${{ secrets.GMAIL_TOKEN_ENCRYPTION_KEY }}
          GMAIL_TOKEN_ENCRYPTION_KEY_CURRENT: ${{ secrets.GMAIL_TOKEN_ENCRYPTION_KEY_CURRENT }}
          GOOGLE_AUTH_CLIENT_ID: ${{ secrets.GOOGLE_AUTH_CLIENT_ID }}
          GOOGLE_AUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_AUTH_CLIENT_SECRET }}
          GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.GOOGLE_CALENDAR_CLIENT_ID }}
          GOOGLE_CALENDAR_CLIENT_SECRET: ${{ secrets.GOOGLE_CALENDAR_CLIENT_SECRET }}
          GOOGLE_GMAIL_CLIENT_ID: ${{ secrets.GOOGLE_GMAIL_CLIENT_ID }}
          GOOGLE_GMAIL_CLIENT_SECRET: ${{ secrets.GOOGLE_GMAIL_CLIENT_SECRET }}
          LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          LINEAR_CLIENT_SECRET: ${{ secrets.LINEAR_CLIENT_SECRET }}
          MAIL_INGEST_TOKEN: ${{ secrets.MAIL_INGEST_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_ORGANIZATION_ID: ${{ vars.POLAR_ORGANIZATION_ID || secrets.POLAR_ORGANIZATION_ID }}
          POLAR_PRODUCT_MANAGED_ID: ${{ vars.POLAR_PRODUCT_MANAGED_ID }}
          POLAR_PRODUCT_PRO_ID: ${{ vars.POLAR_PRODUCT_PRO_ID }}
          POLAR_SANDBOX: ${{ vars.POLAR_SANDBOX }}
          POLAR_WEBHOOK_SECRET: ${{ secrets.POLAR_WEBHOOK_SECRET }}
          QUIETER_AUTH_MAIL_MODE: ${{ vars.QUIETER_AUTH_MAIL_MODE }}
          QUIETER_AUTH_MAIL_SENDER: ${{ vars.QUIETER_AUTH_MAIL_SENDER }}
          QUIETER_GMAIL_AI_AUTOMATION_ENABLED: ${{ vars.QUIETER_GMAIL_AI_AUTOMATION_ENABLED }}
          QUIETER_MAIL_API_KEY: ${{ secrets.QUIETER_MAIL_API_KEY }}
          QUIETER_PREVIEW_PERSONAS_ENABLED: ${{ vars.QUIETER_PREVIEW_PERSONAS_ENABLED }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          VITE_LOGO_DEV_PUBLISHABLE_KEY: ${{ vars.VITE_LOGO_DEV_PUBLISHABLE_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ vars.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_QUIETER_PREVIEW_PERSONAS_ENABLED: ${{ vars.VITE_QUIETER_PREVIEW_PERSONAS_ENABLED }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
        run: |
          bun scripts/sync-sst-secrets.ts --stage "$SST_STAGE"
          bunx sst deploy --config sst.config.ts --stage "$SST_STAGE"

      - name: Rotate legacy Gmail credentials
        if: ${{ env.SST_STAGE == 'production' }}
        env:
          GMAIL_CREDENTIAL_ROTATION_TOKEN: ${{ secrets.GMAIL_CREDENTIAL_ROTATION_TOKEN }}
        run: |
          bun run - <<'EOF'
          const token = process.env.GMAIL_CREDENTIAL_ROTATION_TOKEN;
          if (!token) throw new Error("GMAIL_CREDENTIAL_ROTATION_TOKEN is required.");

          const response = await fetch("https://quieter.email/api/internal/gmail-credentials/rotate", {
            headers: { Authorization: `Bearer ${token}` },
            method: "POST",
          });
          const body = await response.text();
          if (!response.ok) {
            throw new Error(`Gmail credential rotation failed with ${response.status}: ${body}`);
          }

          const result = JSON.parse(body);
          console.log(`Rotated ${result.rotated ?? 0} legacy Gmail credential records.`);
          EOF
