name: Deploy SST Mail Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage to deploy
        required: true
        default: production
        type: choice
        options:
          - production
          - mail-dev

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.stage || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.stage || 'production' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: ${{ inputs.stage || 'production' }}
    timeout-minutes: 10
    env:
      SST_STAGE: ${{ inputs.stage || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy SST
        run: bunx sst deploy --config sst.config.ts --stage "$SST_STAGE"
