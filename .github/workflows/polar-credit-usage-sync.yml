name: Sync Polar Credit Usage

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate production env and count pending rows without sending Polar events
        required: true
        default: true
        type: boolean
      limit:
        description: Usage events to process per batch
        required: true
        default: "100"
        type: string

permissions:
  contents: read

concurrency:
  group: quieter-polar-credit-usage-sync-production
  cancel-in-progress: false

jobs:
  sync:
    name: Sync production credit usage
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: production
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
      POLAR_CREDIT_USAGE_SYNC_LIMIT: ${{ inputs.limit }}
      POLAR_ORGANIZATION_ID: ${{ vars.POLAR_ORGANIZATION_ID || secrets.POLAR_ORGANIZATION_ID }}
      POLAR_PRODUCT_MANAGED_ID: ${{ vars.POLAR_PRODUCT_MANAGED_ID || secrets.POLAR_PRODUCT_MANAGED_ID }}
      POLAR_PRODUCT_PRO_ID: ${{ vars.POLAR_PRODUCT_PRO_ID || secrets.POLAR_PRODUCT_PRO_ID }}
      POLAR_SANDBOX: ${{ vars.POLAR_SANDBOX }}
      VERCEL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate required env
        run: |
          set -euo pipefail

          for name in DATABASE_URL POLAR_ACCESS_TOKEN POLAR_PRODUCT_MANAGED_ID POLAR_PRODUCT_PRO_ID; do
            if [ -z "${!name:-}" ]; then
              echo "$name is required." >&2
              exit 1
            fi
          done

      - name: Count pending credit usage events
        if: ${{ inputs.dry_run }}
        run: |
          bun run - <<'EOF'
          const { countPendingPolarCreditUsageEvents } = await import("./packages/billing/src/credits.ts");
          const count = await countPendingPolarCreditUsageEvents();
          console.log(`${count} current-period credit usage events are pending Polar sync.`);
          EOF

      - name: Sync pending credit usage events to Polar
        if: ${{ !inputs.dry_run }}
        run: bun run billing:sync-credit-usage-polar
