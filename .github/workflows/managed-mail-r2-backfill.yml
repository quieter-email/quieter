name: Backfill Managed Mail R2

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: Rows to read per batch
        required: true
        default: "100"
      concurrency:
        description: Parallel object copies per batch
        required: true
        default: "5"

permissions:
  contents: read
  id-token: write

concurrency:
  group: quieter-deploy-production
  cancel-in-progress: false

jobs:
  backfill:
    name: Backfill managed mail raw objects
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: production
    timeout-minutes: 60
    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: "24.18.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Validate backfill configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MAIL_BUCKET: ${{ vars.MAIL_BUCKET || secrets.MAIL_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          for name in DATABASE_URL MAIL_BUCKET R2_ACCESS_KEY_ID R2_ACCOUNT_ID R2_BUCKET R2_SECRET_ACCESS_KEY; do
            if [ -z "${!name}" ]; then
              echo "$name is required." >&2
              exit 1
            fi
          done

      - name: Backfill managed mail raw objects to R2
        env:
          BACKFILL_BATCH_SIZE: ${{ inputs.batch_size }}
          BACKFILL_CONCURRENCY: ${{ inputs.concurrency }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MAIL_BUCKET: ${{ vars.MAIL_BUCKET || secrets.MAIL_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT || secrets.R2_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: bun packages/aws/scripts/backfill-managed-mail-r2.ts
