[features]
hooks = true
codex_hooks = true

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'node "$(git rev-parse --show-toplevel)/.codex/hooks/review-local-changes.mjs" review'
command_windows = "powershell.exe -NoProfile -Command \"node (Join-Path ((git rev-parse --show-toplevel).Trim()) '.codex/hooks/review-local-changes.mjs') review\""
timeout = 30
statusMessage = "Checking implementation quality"
